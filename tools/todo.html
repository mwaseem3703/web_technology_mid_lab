<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Master - CrispyTools</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
        }

        .tool-card {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 30px;
        }

        .task-item {
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px 20px;
            border: 1px solid #e2e8f0;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mini-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            text-decoration: none;
            color: inherit;
            display: block;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }

        .mini-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="../index.html"><span
                    style="color: #818cf8;">Crispy</span>Tools</a>
            <div class="ms-auto"><a href="../index.html"
                    class="btn btn-outline-light btn-sm rounded-pill px-3">Dashboard</a></div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="tool-card shadow-sm">
                    <h2 class="fw-bold mb-4 text-center"><i class="fas fa-tasks text-primary me-2"></i>Task Master</h2>
                    <div class="input-group mb-4">
                        <input type="text" id="taskInput" class="form-control border-0 bg-light"
                            placeholder="New task...">
                        <button class="btn btn-primary px-4" onclick="addTask()">Add</button>
                    </div>
                    <div id="taskList"></div>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <h5 class="fw-bold mb-3">Try Other Tools</h5>
            <div class="row g-3">
                <div class="col-md-3"><a href="wordcount.html" class="mini-card text-center"><i
                            class="fas fa-font mb-2 text-primary"></i>
                        <div class="small fw-bold">Word Counter</div>
                    </a></div>
                <div class="col-md-3"><a href="age.html" class="mini-card text-center"><i
                            class="fas fa-calendar mb-2 text-primary"></i>
                        <div class="small fw-bold">Age Calculator</div>
                    </a></div>
                <div class="col-md-3"><a href="currency.html" class="mini-card text-center"><i
                            class="fas fa-dollar-sign mb-2 text-primary"></i>
                        <div class="small fw-bold">Currency</div>
                    </a></div>
                <div class="col-md-3"><a href="tips.html" class="mini-card text-center"><i
                            class="fas fa-receipt mb-2 text-primary"></i>
                        <div class="small fw-bold">Tip Splitter</div>
                    </a></div>
            </div>
        </div>
    </main>

    <footer class="bg-white py-4 border-top mt-auto text-center small text-muted">&copy; 2026 CrispyTools | M. Waseem
    </footer>

    <script>
        let tasks = JSON.parse(localStorage.getItem('crispyTasks')) || [];
        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            tasks.forEach((task, index) => {
                const item = document.createElement('div');
                item.className = 'task-item';
                item.innerHTML = `<span>${task.text}</span><button class="btn btn-sm text-danger" onclick="deleteTask(${index})"><i class="fas fa-trash"></i></button>`;
                list.appendChild(item);
            });
            localStorage.setItem('crispyTasks', JSON.stringify(tasks));
        }
        function addTask() {
            const input = document.getElementById('taskInput');
            if (!input.value.trim()) return;
            tasks.push({ text: input.value });
            input.value = "";
            renderTasks();
        }
        function deleteTask(index) { tasks.splice(index, 1); renderTasks(); }
        renderTasks();
    </script>
</body>

</html>
