<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Splitter - CrispyTools</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
        }

        .tool-card {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 40px;
        }

        .amount-display {
            background: #f0fdf4;
            border: 1px solid #dcfce7;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .mini-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            text-decoration: none;
            color: inherit;
            display: block;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }

        .mini-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="../index.html"><span
                    style="color: #818cf8;">Crispy</span>Tools</a>
            <div class="ms-auto"><a href="../index.html"
                    class="btn btn-outline-light btn-sm rounded-pill px-3">Dashboard</a></div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="tool-card shadow-sm">
                    <h2 class="fw-bold mb-4 text-center"><i class="fas fa-receipt text-success me-2"></i>Tip Splitter
                    </h2>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Total Bill ($)</label>
                        <input type="number" id="bill" class="form-control bg-light border-0" placeholder="0.00"
                            oninput="calculate()">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Tip Percentage (%)</label>
                        <select id="tipPerc" class="form-select bg-light border-0" onchange="calculate()">
                            <option value="5">5%</option>
                            <option value="10">10%</option>
                            <option value="15" selected>15%</option>
                            <option value="20">20%</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Number of People</label>
                        <input type="number" id="people" class="form-control bg-light border-0" value="1"
                            oninput="calculate()">
                    </div>
                    <div class="amount-display">
                        <div class="text-muted small">Each Person Pays</div>
                        <div class="h1 fw-bold text-success mb-0">$<span id="totalEach">0.00</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <h5 class="fw-bold mb-3">Try Other Tools</h5>
            <div class="row g-3">
                <div class="col-md-3"><a href="bmi.html" class="mini-card text-center"><i
                            class="fas fa-heartbeat mb-2 text-primary"></i>
                        <div class="small fw-bold">BMI Calculator</div>
                    </a></div>
                <div class="col-md-3"><a href="passgen.html" class="mini-card text-center"><i
                            class="fas fa-key mb-2 text-primary"></i>
                        <div class="small fw-bold">Password Gen</div>
                    </a></div>
                <div class="col-md-3"><a href="base.html" class="mini-card text-center"><i
                            class="fas fa-terminal mb-2 text-primary"></i>
                        <div class="small fw-bold">Binary Hub</div>
                    </a></div>
                <div class="col-md-3"><a href="todo.html" class="mini-card text-center"><i
                            class="fas fa-tasks mb-2 text-primary"></i>
                        <div class="small fw-bold">Task Master</div>
                    </a></div>
            </div>
        </div>
    </main>

    <footer class="bg-white py-4 border-top mt-auto text-center small text-muted">&copy; 2026 CrispyTools | M. Waseem
    </footer>

    <script>
        function calculate() {
            const bill = parseFloat(document.getElementById('bill').value);
            const tipPerc = parseFloat(document.getElementById('tipPerc').value);
            const people = parseInt(document.getElementById('people').value);
            if (bill > 0 && people > 0) {
                const totalTip = bill * (tipPerc / 100);
                const totalBill = bill + totalTip;
                document.getElementById('totalEach').innerText = (totalBill / people).toFixed(2);
            }
        }
    </script>
</body>

</html>
