<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Studio - CrispyTools</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
        }

        .tool-card {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 40px;
        }

        .color-preview {
            height: 150px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .mini-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            text-decoration: none;
            color: inherit;
            display: block;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }

        .mini-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="../index.html"><span
                    style="color: #818cf8;">Crispy</span>Tools</a>
            <div class="ms-auto"><a href="../index.html"
                    class="btn btn-outline-light btn-sm rounded-pill px-3">Dashboard</a></div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="tool-card shadow-sm">
                    <h2 class="fw-bold mb-4 text-center"><i class="fas fa-palette text-primary me-2"></i>Color Studio
                    </h2>

                    <div id="preview" class="color-preview" style="background-color: rgb(99, 102, 241); color: white;">
                        #6366F1</div>

                    <div class="mb-3">
                        <div class="slider-label"><span>Red</span><span id="rv">99</span></div>
                        <input type="range" class="form-range" id="r" min="0" max="255" value="99"
                            oninput="updateColor()">
                    </div>
                    <div class="mb-3">
                        <div class="slider-label"><span>Green</span><span id="gv">102</span></div>
                        <input type="range" class="form-range" id="g" min="0" max="255" value="102"
                            oninput="updateColor()">
                    </div>
                    <div class="mb-4">
                        <div class="slider-label"><span>Blue</span><span id="bv">241</span></div>
                        <input type="range" class="form-range" id="b" min="0" max="255" value="241"
                            oninput="updateColor()">
                    </div>

                    <button class="btn btn-dark w-100 py-2 fw-bold rounded-3" onclick="copyHex()">Copy HEX Code</button>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <h5 class="fw-bold mb-3">Try Other Tools</h5>
            <div class="row g-3">
                <div class="col-md-3"><a href="unit.html" class="mini-card text-center"><i
                            class="fas fa-ruler-combined mb-2 text-primary"></i>
                        <div class="small fw-bold">Unit Converter</div>
                    </a></div>
                <div class="col-md-3"><a href="passgen.html" class="mini-card text-center"><i
                            class="fas fa-key mb-2 text-primary"></i>
                        <div class="small fw-bold">Password Gen</div>
                    </a></div>
                <div class="col-md-3"><a href="base.html" class="mini-card text-center"><i
                            class="fas fa-terminal mb-2 text-primary"></i>
                        <div class="small fw-bold">Binary Hub</div>
                    </a></div>
                <div class="col-md-3"><a href="bmi.html" class="mini-card text-center"><i
                            class="fas fa-heartbeat mb-2 text-primary"></i>
                        <div class="small fw-bold">BMI Calculator</div>
                    </a></div>
            </div>
        </div>
    </main>

    <footer class="bg-white py-4 border-top mt-5">
        <div class="container text-center">
            <p class="mb-0 text-muted small">&copy; 2026 CrispyTools | M. Waseem</p>
        </div>
    </footer>

    <script>
        function updateColor() {
            const r = document.getElementById('r').value;
            const g = document.getElementById('g').value;
            const b = document.getElementById('b').value;

            document.getElementById('rv').innerText = r;
            document.getElementById('gv').innerText = g;
            document.getElementById('bv').innerText = b;

            const hex = "#" + ((1 << 24) + (+r << 16) + (+g << 8) + +b).toString(16).slice(1).toUpperCase();
            const preview = document.getElementById('preview');
            preview.style.backgroundColor = `rgb(${r},${g},${b})`;
            preview.innerText = hex;

            // Contrast logic: make text dark if background is light
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            preview.style.color = brightness > 125 ? 'black' : 'white';
        }

        function copyHex() {
            navigator.clipboard.writeText(document.getElementById('preview').innerText);
            alert("Hex code copied!");
        }
    </script>
</body>

</html>
