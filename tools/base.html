<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Hub - CrispyTools</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
        }

        .tool-card {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 40px;
        }

        .mini-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            text-decoration: none;
            color: inherit;
            display: block;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }

        .mini-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="../index.html"><span
                    style="color: #818cf8;">Crispy</span>Tools</a>
            <div class="ms-auto"><a href="../index.html"
                    class="btn btn-outline-light btn-sm rounded-pill px-3">Dashboard</a></div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="tool-card shadow-sm">
                    <h2 class="fw-bold mb-4 text-center"><i class="fas fa-terminal text-primary me-2"></i>Binary Hub
                    </h2>
                    <div class="mb-3"><label class="small fw-bold">Decimal</label><input type="number" id="dec"
                            class="form-control bg-light border-0" oninput="convert(this, 10)"></div>
                    <div class="mb-3"><label class="small fw-bold">Binary</label><input type="text" id="bin"
                            class="form-control bg-light border-0" oninput="convert(this, 2)"></div>
                    <div class="mb-3"><label class="small fw-bold">Hex</label><input type="text" id="hex"
                            class="form-control bg-light border-0" oninput="convert(this, 16)"></div>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <h5 class="fw-bold mb-3">Try Other Tools</h5>
            <div class="row g-3">
                <div class="col-md-3"><a href="color.html" class="mini-card text-center"><i
                            class="fas fa-palette mb-2 text-primary"></i>
                        <div class="small fw-bold">Color Studio</div>
                    </a></div>
                <div class="col-md-3"><a href="unit.html" class="mini-card text-center"><i
                            class="fas fa-ruler mb-2 text-primary"></i>
                        <div class="small fw-bold">Unit Converter</div>
                    </a></div>
                <div class="col-md-3"><a href="clock.html" class="mini-card text-center"><i
                            class="fas fa-clock mb-2 text-primary"></i>
                        <div class="small fw-bold">Clock</div>
                    </a></div>
                <div class="col-md-3"><a href="markdown.html" class="mini-card text-center"><i
                            class="fab fa-markdown mb-2 text-primary"></i>
                        <div class="small fw-bold">MD Preview</div>
                    </a></div>
            </div>
        </div>
    </main>

    <footer class="bg-white py-4 border-top mt-auto text-center small text-muted">&copy; 2026 CrispyTools | M. Waseem
    </footer>

    <script>
        function convert(el, base) {
            let val = el.value.trim();
            if (!val) { document.getElementById('dec').value = ""; document.getElementById('bin').value = ""; document.getElementById('hex').value = ""; return; }
            let d = parseInt(val, base);
            if (isNaN(d)) return;
            if (base !== 10) document.getElementById('dec').value = d;
            if (base !== 2) document.getElementById('bin').value = d.toString(2);
            if (base !== 16) document.getElementById('hex').value = d.toString(16).toUpperCase();
        }
    </script>
</body>

</html>
