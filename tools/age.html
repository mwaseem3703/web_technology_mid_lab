<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator - CrispyTools</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
        }

        .tool-card {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 40px;
        }

        .mini-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            text-decoration: none;
            color: inherit;
            display: block;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }

        .mini-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }

        .result-box {
            background: #f1f5f9;
            border-radius: 15px;
            padding: 20px;
            margin-top: 25px;
            display: none;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="../index.html"><span
                    style="color: #818cf8;">Crispy</span>Tools</a>
            <div class="ms-auto"><a href="../index.html"
                    class="btn btn-outline-light btn-sm rounded-pill px-3">Dashboard</a></div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="tool-card shadow-sm">
                    <h2 class="fw-bold mb-4 text-center"><i class="fas fa-calendar-check text-primary me-2"></i>Age
                        Calculator</h2>

                    <div class="mb-4">
                        <label class="form-label small fw-bold">Select Date of Birth</label>
                        <input type="date" id="dob" class="form-control form-control-lg bg-light border-0">
                    </div>

                    <button class="btn btn-primary w-100 py-3 fw-bold rounded-3" style="background: var(--primary);"
                        onclick="calculateAge()">Calculate Age</button>

                    <div id="ageResult" class="result-box text-center">
                        <div class="h3 fw-bold text-primary mb-1" id="mainAge"></div>
                        <div class="text-muted small" id="detailAge"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <h5 class="fw-bold mb-3">Try Other Tools</h5>
            <div class="row g-3">
                <div class="col-md-3"><a href="bmi.html" class="mini-card text-center"><i
                            class="fas fa-weight mb-2 text-primary"></i>
                        <div class="small fw-bold">BMI Calculator</div>
                    </a></div>
                <div class="col-md-3"><a href="wordcount.html" class="mini-card text-center"><i
                            class="fas fa-font mb-2 text-primary"></i>
                        <div class="small fw-bold">Word Counter</div>
                    </a></div>
                <div class="col-md-3"><a href="passgen.html" class="mini-card text-center"><i
                            class="fas fa-key mb-2 text-primary"></i>
                        <div class="small fw-bold">Password Gen</div>
                    </a></div>
                <div class="col-md-3"><a href="clock.html" class="mini-card text-center"><i
                            class="fas fa-clock mb-2 text-primary"></i>
                        <div class="small fw-bold">Digital Clock</div>
                    </a></div>
            </div>
        </div>
    </main>

    <footer class="bg-white py-4 border-top mt-5">
        <div class="container text-center">
            <p class="mb-0 text-muted small">&copy; 2026 CrispyTools | Developed by M. Waseem</p>
        </div>
    </footer>

    <script>
        function calculateAge() {
            const birthDate = new Date(document.getElementById('dob').value);
            const today = new Date();
            const resBox = document.getElementById('ageResult');

            if (isNaN(birthDate)) return alert("Please select a valid date.");

            let years = today.getFullYear() - birthDate.getFullYear();
            let months = today.getMonth() - birthDate.getMonth();
            let days = today.getDate() - birthDate.getDate();

            if (days < 0) {
                months--;
                days += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
            }
            if (months < 0) {
                years--;
                months += 12;
            }

            resBox.style.display = "block";
            document.getElementById('mainAge').innerText = `${years} Years Old`;
            document.getElementById('detailAge').innerText = `${months} Months and ${days} Days`;
        }
    </script>
</body>

</html>
