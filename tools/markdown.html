<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Previewer - CrispyTools</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
        }

        .tool-card {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 25px;
            min-height: 500px;
        }

        #preview {
            background: #fff;
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            min-height: 400px;
            overflow-y: auto;
        }

        textarea {
            font-family: 'Courier New', monospace;
            resize: none;
            border-radius: 12px !important;
        }

        .mini-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            text-decoration: none;
            color: inherit;
            display: block;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }

        .mini-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="../index.html"><span
                    style="color: #818cf8;">Crispy</span>Tools</a>
            <div class="ms-auto"><a href="../index.html"
                    class="btn btn-outline-light btn-sm rounded-pill px-3">Dashboard</a></div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <h2 class="fw-bold mb-4 text-center"><i class="fab fa-markdown text-primary me-2"></i>MD Previewer</h2>
        <div class="row g-4">
            <div class="col-md-6">
                <div class="tool-card shadow-sm">
                    <label class="fw-bold mb-2 small text-muted text-uppercase">Markdown Input</label>
                    <textarea id="mdInput" class="form-control border-0 bg-light h-100"
                        placeholder="# Hello World&#10;Type some **markdown** here..."
                        oninput="updatePreview()"></textarea>
                </div>
            </div>
            <div class="col-md-6">
                <div class="tool-card shadow-sm">
                    <label class="fw-bold mb-2 small text-muted text-uppercase">Live Preview</label>
                    <div id="preview"></div>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <h5 class="fw-bold mb-3">Try Other Tools</h5>
            <div class="row g-3">
                <div class="col-md-3"><a href="todo.html" class="mini-card text-center"><i
                            class="fas fa-list-check mb-2 text-primary"></i>
                        <div class="small fw-bold">Task Master</div>
                    </a></div>
                <div class="col-md-3"><a href="base.html" class="mini-card text-center"><i
                            class="fas fa-terminal mb-2 text-primary"></i>
                        <div class="small fw-bold">Binary Hub</div>
                    </a></div>
                <div class="col-md-3"><a href="currency.html" class="mini-card text-center"><i
                            class="fas fa-dollar-sign mb-2 text-primary"></i>
                        <div class="small fw-bold">Currency Hub</div>
                    </a></div>
                <div class="col-md-3"><a href="bmi.html" class="mini-card text-center"><i
                            class="fas fa-heartbeat mb-2 text-primary"></i>
                        <div class="small fw-bold">BMI Calculator</div>
                    </a></div>
            </div>
        </div>
    </main>

    <footer class="bg-white py-4 border-top mt-auto text-center small text-muted">&copy; 2026 CrispyTools | M. Waseem
    </footer>

    <script>
        function updatePreview() {
            const input = document.getElementById('mdInput').value;
            document.getElementById('preview').innerHTML = marked.parse(input);
        }
        // Run once for placeholder
        updatePreview();
    </script>
</body>

</html>
