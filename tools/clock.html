<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock & Timer - CrispyTools</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
        }

        .tool-card {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 40px;
        }

        .display-screen {
            background: #1e293b;
            color: #818cf8;
            padding: 30px;
            border-radius: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 3rem;
            text-align: center;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        .nav-pills .nav-link.active {
            background-color: var(--primary);
        }

        .mini-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            text-decoration: none;
            color: inherit;
            display: block;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }

        .mini-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="../index.html"><span
                    style="color: #818cf8;">Crispy</span>Tools</a>
            <div class="ms-auto"><a href="../index.html"
                    class="btn btn-outline-light btn-sm rounded-pill px-3">Dashboard</a></div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="tool-card shadow-sm text-center">
                    <ul class="nav nav-pills justify-content-center mb-4" id="pills-tab">
                        <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill"
                                data-bs-target="#clock-tab">Clock</button></li>
                        <li class="nav-item"><button class="nav-link" data-bs-toggle="pill"
                                data-bs-target="#timer-tab">Stopwatch</button></li>
                    </ul>

                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="clock-tab">
                            <h2 class="fw-bold mb-4">Current Time</h2>
                            <div id="clockDisplay" class="display-screen">00:00:00</div>
                        </div>

                        <div class="tab-pane fade" id="timer-tab">
                            <h2 class="fw-bold mb-4">Stopwatch</h2>
                            <div id="stopwatchDisplay" class="display-screen">00:00:00</div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-success flex-grow-1" onclick="startStopwatch()">Start</button>
                                <button class="btn btn-warning flex-grow-1" onclick="pauseStopwatch()">Pause</button>
                                <button class="btn btn-danger flex-grow-1" onclick="resetStopwatch()">Reset</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <h5 class="fw-bold mb-3">Try Other Tools</h5>
            <div class="row g-3">
                <div class="col-md-3"><a href="tips.html" class="mini-card text-center"><i
                            class="fas fa-receipt mb-2 text-primary"></i>
                        <div class="small fw-bold">Tip Splitter</div>
                    </a></div>
                <div class="col-md-3"><a href="todo.html" class="mini-card text-center"><i
                            class="fas fa-tasks mb-2 text-primary"></i>
                        <div class="small fw-bold">Task Master</div>
                    </a></div>
                <div class="col-md-3"><a href="bmi.html" class="mini-card text-center"><i
                            class="fas fa-heartbeat mb-2 text-primary"></i>
                        <div class="small fw-bold">BMI Calculator</div>
                    </a></div>
                <div class="col-md-3"><a href="base.html" class="mini-card text-center"><i
                            class="fas fa-terminal mb-2 text-primary"></i>
                        <div class="small fw-bold">Binary Hub</div>
                    </a></div>
            </div>
        </div>
    </main>

    <footer class="bg-white py-4 border-top mt-auto text-center">
        <p class="mb-0 text-muted small">&copy; 2026 CrispyTools | M. Waseem</p>
    </footer>

    <script>
        // Clock Logic
        setInterval(() => {
            const now = new Date();
            document.getElementById('clockDisplay').innerText = now.toLocaleTimeString();
        }, 1000);

        // Stopwatch Logic
        let timer;
        let seconds = 0;
        function startStopwatch() {
            if (timer) return;
            timer = setInterval(() => {
                seconds++;
                let hrs = Math.floor(seconds / 3600);
                let mins = Math.floor((seconds - hrs * 3600) / 60);
                let secs = seconds % 60;
                document.getElementById('stopwatchDisplay').innerText =
                    `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }
        function pauseStopwatch() { clearInterval(timer); timer = null; }
        function resetStopwatch() { pauseStopwatch(); seconds = 0; document.getElementById('stopwatchDisplay').innerText = "00:00:00"; }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
