<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Hub - CrispyTools</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
        }

        .tool-card {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 40px;
        }

        .amount-card {
            background: #f1f5f9;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .mini-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            text-decoration: none;
            color: inherit;
            display: block;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="../index.html"><span
                    style="color: #818cf8;">Crispy</span>Tools</a>
            <div class="ms-auto"><a href="../index.html"
                    class="btn btn-outline-light btn-sm rounded-pill px-3">Dashboard</a></div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="tool-card shadow-sm">
                    <h2 class="fw-bold mb-4 text-center"><i class="fas fa-dollar-sign text-success me-2"></i>Currency
                        Hub</h2>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Amount in USD ($)</label>
                        <input type="number" id="usdInput" class="form-control form-control-lg bg-light border-0"
                            placeholder="100" oninput="convert()">
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <div class="amount-card">
                                <div class="small text-muted mb-1">PKR</div>
                                <div class="fw-bold h5 mb-0" id="pkr">0</div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="amount-card">
                                <div class="small text-muted mb-1">INR</div>
                                <div class="fw-bold h5 mb-0" id="inr">0</div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="amount-card">
                                <div class="small text-muted mb-1">EUR</div>
                                <div class="fw-bold h5 mb-0" id="eur">0</div>
                            </div>
                        </div>
                    </div>
                    <p class="text-center text-danger x-small">*Conversion rates are fixed </p>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <h5 class="fw-bold mb-3">Try Other Tools</h5>
            <div class="row g-3">
                <div class="col-md-3"><a href="tips.html" class="mini-card text-center"><i
                            class="fas fa-calculator mb-2 text-primary"></i>
                        <div class="small fw-bold">Tip Splitter</div>
                    </a></div>
                <div class="col-md-3"><a href="age.html" class="mini-card text-center"><i
                            class="fas fa-calendar-check mb-2 text-primary"></i>
                        <div class="small fw-bold">Age Calculator</div>
                    </a></div>
                <div class="col-md-3"><a href="wordcount.html" class="mini-card text-center"><i
                            class="fas fa-font mb-2 text-primary"></i>
                        <div class="small fw-bold">Word Counter</div>
                    </a></div>
                <div class="col-md-3"><a href="passgen.html" class="mini-card text-center"><i
                            class="fas fa-key mb-2 text-primary"></i>
                        <div class="small fw-bold">Password Gen</div>
                    </a></div>
            </div>
        </div>
    </main>

    <footer class="bg-white py-4 border-top mt-auto text-center small text-muted">&copy; 2026 CrispyTools | M. Waseem
    </footer>

    <script>
        function convert() {
            const usd = parseFloat(document.getElementById('usdInput').value);
            if (isNaN(usd)) return;

            // Static rates for demonstration
            document.getElementById('pkr').innerText = (usd * 278.50).toFixed(0);
            document.getElementById('inr').innerText = (usd * 83.30).toFixed(0);
            document.getElementById('eur').innerText = (usd * 0.92).toFixed(2);
        }
    </script>
</body>

</html>
