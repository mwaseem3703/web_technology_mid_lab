<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator - CrispyTools</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
        }

        .tool-card {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
        }

        .mini-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            text-decoration: none;
            color: inherit;
            display: block;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }

        .mini-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }

        .result-display {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="../index.html">
                <span style="color: #818cf8;">Crispy</span>Tools
            </a>
            <div class="ms-auto">
                <a href="../index.html" class="btn btn-outline-light btn-sm rounded-pill px-3">View All Tools</a>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="tool-card">
                    <h2 class="fw-bold mb-4 text-center"><i class="fas fa-heartbeat text-danger me-2"></i>BMI Calculator
                    </h2>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Your Weight (kg)</label>
                        <input type="number" id="weight" class="form-control form-control-lg bg-light border-0"
                            placeholder="70">
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Your Height (cm)</label>
                        <input type="number" id="height" class="form-control form-control-lg bg-light border-0"
                            placeholder="175">
                    </div>

                    <button class="btn btn-primary w-100 py-3 fw-bold rounded-3" style="background: var(--primary);"
                        onclick="calcBMI()">Calculate Now</button>

                    <div id="result" class="result-display"></div>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <h5 class="fw-bold mb-3">Try Other Tools</h5>
            <div class="row g-3">
                <div class="col-md-3">
                    <a href="wordcount.html" class="mini-card text-center">
                        <i class="fas fa-font mb-2 text-primary"></i>
                        <div class="small fw-bold">Word Counter</div>
                    </a>
                </div>
                <div class="col-md-3">
                    <a href="passgen.html" class="mini-card text-center">
                        <i class="fas fa-key mb-2 text-primary"></i>
                        <div class="small fw-bold">Password Gen</div>
                    </a>
                </div>
                <div class="col-md-3">
                    <a href="age.html" class="mini-card text-center">
                        <i class="fas fa-calendar mb-2 text-primary"></i>
                        <div class="small fw-bold">Age Calculator</div>
                    </a>
                </div>
                <div class="col-md-3">
                    <a href="color.html" class="mini-card text-center">
                        <i class="fas fa-eye-dropper mb-2 text-primary"></i>
                        <div class="small fw-bold">Color Studio</div>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white py-4 border-top mt-5">
        <div class="container text-center">
            <p class="mb-0 text-muted small">&copy; 2026 CrispyTools | Developed by M. Waseem</p>
        </div>
    </footer>

    <script>
        function calcBMI() {
            const w = document.getElementById('weight').value;
            const h = document.getElementById('height').value / 100;
            const res = document.getElementById('result');
            if (w > 0 && h > 0) {
                const bmi = (w / (h * h)).toFixed(1);
                res.style.display = "block";
                let category = bmi < 18.5 ? "Underweight" : bmi < 25 ? "Healthy" : "Overweight";
                let color = bmi < 18.5 ? "#fef3c7" : bmi < 25 ? "#dcfce7" : "#fee2e2";
                res.style.backgroundColor = color;
                res.innerHTML = `Your BMI is ${bmi} (${category})`;
            }
        }
    </script>
</body>

</html>
